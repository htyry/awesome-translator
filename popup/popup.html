<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Awesome Translator</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <header class="header">
      <h1 class="title">Awesome Translator</h1>
      <div class="mode-tabs">
        <button class="mode-tab active" data-mode="quick">Quick</button>
        <button class="mode-tab" data-mode="agent">Context</button>
        <button class="mode-tab" data-mode="deep">Deep</button>
      </div>
    </header>

    <div class="input-section">
      <textarea
        id="sourceText"
        placeholder="Enter text to translate..."
        rows="3"
      ></textarea>

      <div class="language-selector">
        <select id="targetLang">
          <option value="zh">中文</option>
          <option value="en">English</option>
          <option value="ja">日本語</option>
          <option value="ko">한국어</option>
          <option value="es">Spanish</option>
          <option value="fr">French</option>
          <option value="de">German</option>
        </select>
      </div>
    </div>

    <div id="intentRow" class="intent-row hidden">
      <span class="intent-badge hidden" id="intentBadge"></span>
      <div class="intent-switch hidden" id="intentSwitch">
        <span class="intent-tag active" data-intent="meaning">Meaning</span>
        <span class="intent-tag" data-intent="grammar">Grammar</span>
      </div>
    </div>

    <div id="keywordsBar" class="keywords-bar">
      <span class="keywords-label">Domain</span>
      <span class="keywords-empty">translating...</span>
    </div>

    <button id="translateBtn" class="translate-btn primary-btn">
      Translate
    </button>

    <div class="output-section">
      <div id="result" class="result-box"></div>
      <div class="output-actions">
        <button id="copyBtn" class="action-btn" style="display: none;" title="Copy">Copy</button>
        <button id="ttsBtn" class="action-btn" title="Read aloud">Speak</button>
        <button id="ttsStopBtn" class="action-btn hidden" title="Stop">Stop</button>
      </div>
    </div>

    <footer class="footer">
      <button id="openPdfBtn" class="settings-btn" style="margin-right:auto" title="Open PDF viewer">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="none" style="vertical-align:-1px"><path d="M2 3.5A1.5 1.5 0 0 1 3.5 2h5.672a1.5 1.5 0 0 1 1.06.44l3.329 3.328a1.5 1.5 0 0 1 .439 1.06V12.5A1.5 1.5 0 0 1 12.5 14h-9A1.5 1.5 0 0 1 2 12.5v-9Z" stroke="currentColor" stroke-width="1.5"/><path d="M5 2v3.5A1.5 1.5 0 0 0 6.5 7H10" stroke="currentColor" stroke-width="1.5"/></svg>
        PDF
      </button>
      <span id="llmStatus" class="llm-status"></span>
      <button id="settingsBtn" class="settings-btn">Settings</button>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
